<svg width="600" height="80" viewBox="0 0 600 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eqBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=JetBrains+Mono:wght@500&amp;display=swap');

    @keyframes bounceLow { 0%, 100% { height: 12px; } 50% { height: 35px; } }
    @keyframes bounceMid { 0%, 100% { height: 18px; } 50% { height: 48px; } }
    @keyframes bounceHigh { 0%, 100% { height: 10px; } 50% { height: 58px; } }
    @keyframes discRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .bar {
      fill: url(#barGrad);
      width: 4px;
      rx: 2px;
      transform-origin: bottom;
    }

    .disc {
      transform-origin: 45px 40px;
      animation: discRotate 4s infinite linear;
    }
  </style>

  <!-- Container Base -->
  <rect width="600" height="80" rx="12" fill="url(#eqBg)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Rotating Music disc icon -->
  <g class="disc">
    <circle cx="45" cy="40" r="22" fill="#111827" stroke="#374151" stroke-width="2"/>
    <circle cx="45" cy="40" r="14" fill="#1e1b4b"/>
    <circle cx="45" cy="40" r="6" fill="#f43f5e"/>
    <path d="M45 18V24" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
    <path d="M45 56V62" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Sound card Details -->
  <text x="82" y="36" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="14" fill="#f1f5f9">Spatial Coding Harmonics &amp; Voice Synthesis Feed</text>
  <text x="82" y="55" font-family="'JetBrains Mono', monospace" font-size="11" fill="#818cf8">🔉 Active Stream - Tuned exclusively for Fahad's Workspace</text>

  <!-- Animated Sound Wave Analyzer (Bouncing equalizer bars) -->
  <g transform="translate(480, 10)">
    <!-- We adjust y position to keep alignment downwards inside the bars layout -->
    <rect x="0" y="5" class="bar" style="animation: bounceLow 0.9s infinite alternate;"/>
    <rect x="7" y="5" class="bar" style="animation: bounceHigh 1.3s infinite alternate; animation-delay: 0.2s"/>
    <rect x="14" y="5" class="bar" style="animation: bounceMid 0.8s infinite alternate; animation-delay: 0.4s"/>
    <rect x="21" y="5" class="bar" style="animation: bounceLow 1.1s infinite alternate; animation-delay: 0.1s"/>
    <rect x="28" y="5" class="bar" style="animation: bounceHigh 1.0s infinite alternate; animation-delay: 0.5s"/>
    <rect x="35" y="5" class="bar" style="animation: bounceMid 0.7s infinite alternate; animation-delay: 0.3s"/>
    <rect x="42" y="5" class="bar" style="animation: bounceLow 1.2s infinite alternate; animation-delay: 0.6s"/>
    <rect x="49" y="5" class="bar" style="animation: bounceHigh 0.8s infinite alternate; animation-delay: 0.2s"/>
    <rect x="56" y="5" class="bar" style="animation: bounceMid 1.1s infinite alternate; animation-delay: 0.4s"/>
  </g>
</svg>
